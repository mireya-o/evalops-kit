version = "0.1"
name = "minimal-suite"
dataset = "dataset.jsonl"
traces_dir = "traces"
trace_filename_pattern = "{case_id}.json"

[[graders]]
name = "final_mentions_hello"
kind = "rule_regex"
pattern = "\\bhello\\b"
must_match = true
flags = "i"

[[graders]]
name = "tool_policy"
kind = "trace_tool_policy"
require_tools = ["lookup"]
forbid_tools = ["shell"]
fail_on_tool_error = true

[[gates]]
kind = "overall_avg_drop_max"
max_drop = 0.0

[[gates]]
kind = "per_grader_avg_drop_max"
grader = "final_mentions_hello"
max_drop = 0.0

[[gates]]
kind = "missing_traces_increase_max"
max_increase = 0

[[gates]]
kind = "invalid_traces_increase_max"
max_increase = 0
